<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Graph Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeede9;
      --bg-info: #e6f1fb; --text-primary: #1a1a1a; --text-secondary: #555550;
      --text-tertiary: #999994; --text-info: #185FA5; --text-danger: #a32d2d;
      --border: rgba(0,0,0,0.13); --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px; --radius-lg: 12px; --canvas-bg: #f0efe9;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1e1e1e; --bg-secondary: #2a2a2a; --bg-tertiary: #141414;
        --bg-info: #0c2340; --text-primary: #e8e8e8; --text-secondary: #aaaaaa;
        --text-tertiary: #666666; --text-info: #85B7EB; --text-danger: #f09595;
        --border: rgba(255,255,255,0.12); --border-md: rgba(255,255,255,0.22);
        --canvas-bg: #111111;
      }
    }
    html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-tertiary); color: var(--text-primary); }
    #app { display: flex; flex-direction: column; height: 100vh; }
    #toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-bottom: 0.5px solid var(--border); background: var(--bg-secondary); flex-shrink: 0; }
    #toolbar .brand { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-right: 6px; letter-spacing: -0.02em; }
    .tb-btn { font-size: 12px; padding: 5px 13px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); cursor: pointer; transition: background 0.15s; font-family: inherit; }
    .tb-btn:hover { background: var(--bg-secondary); }
    .tb-btn.primary { background: #185FA5; color: #fff; border-color: #185FA5; }
    .tb-btn.primary:hover { background: #0C447C; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #sidebar { width: 240px; flex-shrink: 0; border-right: 0.5px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; background: var(--bg-primary); }
    #form-panel { padding: 12px; border-bottom: 0.5px solid var(--border); }
    #form-panel h3 { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
    .field { margin-bottom: 10px; }
    .field label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
    .field input, .field textarea { width: 100%; font-size: 13px; padding: 6px 8px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); font-family: inherit; outline: none; transition: border-color 0.15s; }
    .field input:focus, .field textarea:focus { border-color: #185FA5; }
    .field textarea { resize: none; height: 64px; }
    .color-row { display: flex; align-items: center; gap: 8px; }
    .color-row input[type="color"] { width: 32px; height: 32px; padding: 2px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); background: var(--bg-secondary); cursor: pointer; flex-shrink: 0; }
    .color-hex { flex: 1; font-size: 12px; font-family: 'Cascadia Code','Consolas',monospace; padding: 6px 8px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); outline: none; text-transform: uppercase; }
    .color-hex:focus { border-color: #185FA5; }
    #links-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; min-height: 24px; }
    .link-tag { font-size: 11px; padding: 2px 8px; background: var(--bg-info); color: var(--text-info); border-radius: 99px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .link-tag:hover { opacity: 0.75; }
    #node-list { padding: 12px; flex: 1; }
    #node-list h3 { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .node-item { font-size: 12px; padding: 6px 8px; border-radius: var(--radius-md); cursor: pointer; border: 0.5px solid transparent; margin-bottom: 4px; display: flex; align-items: center; transition: background 0.1s; }
    .node-item:hover { background: var(--bg-secondary); }
    .node-item.selected { border-color: #185FA5; background: var(--bg-info); }
    .node-item .ndot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-right: 6px; }
    .node-item .nid { font-weight: 600; color: var(--text-info); margin-right: 5px; flex-shrink: 0; }
    .node-item .ncontent { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .node-item .ndel { flex-shrink: 0; opacity: 0.35; font-size: 11px; margin-left: 4px; padding: 2px; }
    .node-item .ndel:hover { opacity: 1; color: var(--text-danger); }
    #canvas-wrap { flex: 1; position: relative; overflow: hidden; background: var(--canvas-bg); }
    canvas#graph { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: default; }
    #canvas-hint { position: absolute; bottom: 10px; right: 12px; font-size: 11px; color: var(--text-tertiary); pointer-events: none; }

    /* ── Modals ── */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 20px; width: 380px; max-width: 92vw; box-shadow: 0 8px 40px rgba(0,0,0,0.28); }
    .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .modal textarea { width: 100%; height: 140px; font-size: 12px; font-family: 'Cascadia Code','Consolas',monospace; padding: 8px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); resize: none; outline: none; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

    /* image preview modal */
    #img-modal .modal { width: auto; max-width: min(800px, 92vw); padding: 12px; }
    #img-modal img { display: block; max-width: 100%; max-height: 70vh; border-radius: var(--radius-md); object-fit: contain; }
    #img-modal .img-caption { font-size: 11px; color: var(--text-tertiary); margin-top: 8px; word-break: break-all; }

    /* content detail modal */
    #detail-modal .modal { width: 480px; max-width: 92vw; }
    #detail-modal .modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
    #detail-modal .modal-title { font-size: 17px; font-weight: 700; line-height: 1.3; flex: 1; }
    #detail-modal .modal-close { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-tertiary); padding: 0; line-height: 1; flex-shrink: 0; margin-top: 2px; }
    #detail-modal .modal-close:hover { color: var(--text-primary); }
    #detail-modal .modal-body { font-size: 13px; line-height: 1.65; color: var(--text-secondary); white-space: pre-wrap; word-break: break-word; max-height: 60vh; overflow-y: auto; }
    #detail-modal .modal-img { display: block; max-width: 100%; max-height: 55vh; border-radius: var(--radius-md); object-fit: contain; margin-bottom: 8px; }

    .empty-hint { font-size: 12px; color: var(--text-tertiary); padding: 4px 0; }
  </style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="brand">Node Graph</span>
    <button class="tb-btn primary" id="btn-add">+ Add node</button>
    <div style="flex:1"></div>
    <button class="tb-btn" id="btn-save">Save JSON</button>
    <button class="tb-btn" id="btn-import">Import JSON</button>
  </div>
  <div id="main">
    <div id="sidebar">
      <div id="form-panel">
        <h3 id="form-title">New node</h3>
        <div class="field">
          <label>ID</label>
          <input id="f-id" type="text" readonly style="opacity:0.5;cursor:default" placeholder="Auto-generated">
        </div>
        <div class="field">
          <label>Title</label>
          <input id="f-title" type="text" placeholder="Node title...">
        </div>
        <div class="field">
          <label>Content (text or image URL)</label>
          <textarea id="f-content" placeholder="Enter content or paste an image URL..."></textarea>
        </div>
        <div class="field">
          <label>Color</label>
          <div class="color-row">
            <input type="color" id="f-color-picker" value="#534AB7">
            <input type="text" id="f-color-hex" class="color-hex" value="#534AB7" maxlength="7" placeholder="#534AB7">
          </div>
        </div>
        <div class="field">
          <label>Links to (click nodes in graph to link)</label>
          <div id="links-list"></div>
        </div>
        <button class="tb-btn primary" id="btn-save-node" style="width:100%;margin-top:4px">Save node</button>
      </div>
      <div id="node-list">
        <h3>Nodes</h3>
        <div id="nodes-ul"></div>
      </div>
    </div>
    <div id="canvas-wrap">
      <canvas id="graph"></canvas>
      <div id="canvas-hint">drag to rotate &nbsp;•&nbsp; scroll to zoom &nbsp;•&nbsp; double-click node for details</div>
    </div>
  </div>
</div>

<!-- Import modal -->
<div class="modal-bg" id="import-modal">
  <div class="modal">
    <h3>Import JSON</h3>
    <textarea id="import-ta" placeholder='[{"id":1,"title":"My node","content":"hello","color":"#534AB7","links_to":[]}]'></textarea>
    <div class="modal-btns">
      <button class="tb-btn" id="btn-import-cancel">Cancel</button>
      <button class="tb-btn primary" id="btn-import-ok">Import</button>
    </div>
  </div>
</div>

<!-- Save modal -->
<div class="modal-bg" id="save-modal">
  <div class="modal">
    <h3>Saved JSON</h3>
    <textarea id="save-ta" readonly></textarea>
    <div class="modal-btns">
      <button class="tb-btn" id="btn-copy">Copy to clipboard</button>
      <button class="tb-btn primary" id="btn-save-close">Close</button>
    </div>
  </div>
</div>

<!-- Image preview modal -->
<div class="modal-bg" id="img-modal">
  <div class="modal">
    <img id="img-modal-img" src="" alt="Node image">
    <div class="img-caption" id="img-modal-caption"></div>
    <div class="modal-btns" style="margin-top:10px">
      <button class="tb-btn primary" id="btn-img-close">Close</button>
    </div>
  </div>
</div>

<!-- Content detail modal (double-click) -->
<div class="modal-bg" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="detail-title"></div>
      <button class="modal-close" id="btn-detail-close">✕</button>
    </div>
    <img class="modal-img" id="detail-img" src="" alt="" style="display:none">
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<script>
(function () {
  const DEFAULT_COLOR = '#534AB7';

  let nodes = [];
  let nextId = 1;
  let editingId = null;
  let editLinks = [];
  let selectedId = null;
  let hoveredId = null;   // node under cursor right now

  const imgCache = {};

  const canvas = document.getElementById('graph');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');

  let positions = {};
  let cam = { rotX: 0.4, rotY: 0.6, zoom: 1, panX: 0, panY: 0 };
  let drag = { active: false, last: null, type: null, moved: false };
  let centerAnim = null;

  // ── Utilities ──────────────────────────────────────────────

  function isDark() { return window.matchMedia('(prefers-color-scheme: dark)').matches; }
  function getSize() { const r = wrap.getBoundingClientRect(); return { w: r.width, h: r.height }; }
  function resizeCanvas() { const { w, h } = getSize(); canvas.width = w; canvas.height = h; }

  const IMAGE_URL_RE = /^(https?:\/\/.+|(\.{0,2}\/)?[^\s]+)\.(jpe?g|png|gif|webp|svg|bmp|avif)(\?.*)?$/i;
  function isImageUrl(str) { return IMAGE_URL_RE.test((str || '').trim()); }

  function loadImage(url) {
    const key = url.trim();
    if (key in imgCache) return imgCache[key];
    imgCache[key] = undefined;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { imgCache[key] = img; };
    img.onerror = () => { imgCache[key] = null; };
    img.src = key;
    return undefined;
  }

  function preloadImages() {
    nodes.forEach(n => { if (isImageUrl(n.content)) loadImage(n.content); });
  }

  function normaliseHex(val) {
    if (!val) return null;
    const c = val.trim().replace(/^#+/, '');
    if (/^[0-9a-fA-F]{6}$/.test(c)) return '#' + c.toUpperCase();
    if (/^[0-9a-fA-F]{3}$/.test(c)) return ('#' + c[0]+c[0]+c[1]+c[1]+c[2]+c[2]).toUpperCase();
    return null;
  }

  // Hex color → rgba string with given alpha
  function hexAlpha(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  // Wrap text into lines fitting maxWidth
  function wrapText(text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let cur = '';
    for (const w of words) {
      const test = cur ? cur + ' ' + w : w;
      if (ctx.measureText(test).width > maxWidth && cur) { lines.push(cur); cur = w; }
      else cur = test;
    }
    if (cur) lines.push(cur);
    return lines;
  }

  // Draw a rounded rectangle path
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ── Camera & projection ────────────────────────────────────

  function ensurePosition(id) {
    if (!positions[id]) {
      const angle = Math.random() * Math.PI * 2;
      const elev = (Math.random() - 0.5) * Math.PI;
      const r = 120 + Math.random() * 80;
      positions[id] = {
        x: Math.cos(elev)*Math.cos(angle)*r, y: Math.sin(elev)*r,
        z: Math.cos(elev)*Math.sin(angle)*r, vx: 0, vy: 0, vz: 0
      };
    }
  }

  function project(x, y, z) {
    const { w, h } = getSize();
    const cx = Math.cos(cam.rotX), sx = Math.sin(cam.rotX);
    const cy = Math.cos(cam.rotY), sy = Math.sin(cam.rotY);
    const ry = y*cx - z*sx, rz = y*sx + z*cx;
    const rx2 = x*cy + rz*sy, rz2 = -x*sy + rz*cy;
    const fov = 400 * cam.zoom, pz = rz2 + 500;
    return { px: rx2*fov/pz + w/2 + cam.panX, py: ry*fov/pz + h/2 + cam.panY, scale: fov/pz };
  }

  function centerOnNode(id) {
    const p = positions[id]; if (!p) return;
    const { w, h } = getSize();
    const { px, py } = project(p.x, p.y, p.z);
    const targetX = cam.panX + (w/2 - px), targetY = cam.panY + (h/2 - py);
    const startX = cam.panX, startY = cam.panY;
    const t0 = performance.now(), dur = 380;
    if (centerAnim) cancelAnimationFrame(centerAnim);
    function step(now) {
      const t = Math.min((now - t0) / dur, 1), e = 1 - Math.pow(1-t, 3);
      cam.panX = startX + (targetX - startX)*e;
      cam.panY = startY + (targetY - startY)*e;
      centerAnim = t < 1 ? requestAnimationFrame(step) : null;
    }
    centerAnim = requestAnimationFrame(step);
  }

  // ── Physics ────────────────────────────────────────────────

  function applyForces() {
    if (nodes.length < 2) return;
    nodes.forEach(a => {
      nodes.forEach(b => {
        if (a.id === b.id) return;
        const pa = positions[a.id], pb = positions[b.id]; if (!pa || !pb) return;
        const dx=pa.x-pb.x, dy=pa.y-pb.y, dz=pa.z-pb.z;
        const d2=dx*dx+dy*dy+dz*dz+0.001, d=Math.sqrt(d2), rep=2000/d2;
        pa.vx+=dx/d*rep; pa.vy+=dy/d*rep; pa.vz+=dz/d*rep;
      });
      (a.links_to||[]).forEach(bid => {
        const pa=positions[a.id], pb=positions[bid]; if (!pa||!pb) return;
        const dx=pb.x-pa.x,dy=pb.y-pa.y,dz=pb.z-pa.z;
        const d=Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001, att=0.01*(d-120);
        pa.vx+=dx/d*att; pa.vy+=dy/d*att; pa.vz+=dz/d*att;
        pb.vx-=dx/d*att; pb.vy-=dy/d*att; pb.vz-=dz/d*att;
      });
      const p=positions[a.id];
      p.vx*=0.85; p.vy*=0.85; p.vz*=0.85;
      p.x+=p.vx; p.y+=p.vy; p.z+=p.vz;
    });
  }

  // ── Draw ───────────────────────────────────────────────────

  function draw() {
    const { w, h } = getSize();
    if (canvas.width !== w || canvas.height !== h) resizeCanvas();
    ctx.clearRect(0, 0, w, h);
    const dark = isDark();
    applyForces();

    const projected = nodes.map(n => {
      const p = positions[n.id]; if (!p) return null;
      const { px, py, scale } = project(p.x, p.y, p.z);
      return { id: n.id, px, py, scale, title: n.title || '', content: n.content || '', color: n.color || DEFAULT_COLOR };
    }).filter(Boolean);

    // ── Edges
    nodes.forEach(n => {
      (n.links_to||[]).forEach(lid => {
        const a=projected.find(p=>p.id===n.id), b=projected.find(p=>p.id===lid);
        if (!a||!b) return;
        ctx.beginPath(); ctx.moveTo(a.px,a.py); ctx.lineTo(b.px,b.py);
        ctx.strokeStyle=dark?'rgba(180,180,255,0.25)':'rgba(80,80,180,0.2)';
        ctx.lineWidth=1.5; ctx.stroke();
        const angle=Math.atan2(b.py-a.py,b.px-a.px), ar=7;
        const mx=(a.px+b.px)/2, my=(a.py+b.py)/2;
        ctx.beginPath();
        ctx.moveTo(mx+Math.cos(angle)*ar,my+Math.sin(angle)*ar);
        ctx.lineTo(mx+Math.cos(angle+2.4)*ar*0.6,my+Math.sin(angle+2.4)*ar*0.6);
        ctx.lineTo(mx+Math.cos(angle-2.4)*ar*0.6,my+Math.sin(angle-2.4)*ar*0.6);
        ctx.closePath();
        ctx.fillStyle=dark?'rgba(180,180,255,0.4)':'rgba(80,80,180,0.35)'; ctx.fill();
      });
    });

    // ── Nodes (back to front)
    projected.sort((a,b) => a.scale-b.scale).forEach(p => {
      const isHov  = p.id === hoveredId;
      const isSel  = p.id === selectedId;
      const isEdit = p.id === editingId;
      const isLinked = editLinks.includes(p.id);
      const isImg  = isImageUrl(p.content);
      const hasContent = p.content.trim().length > 0;
      const titleOnly  = p.title.trim().length > 0 && !hasContent;

      // Slightly bigger when hovered
      const rBase = Math.max(14, 18 * p.scale);
      const r = isHov ? rBase * 1.12 : rBase;

      const fill = isLinked ? (dark ? '#1D9E75' : '#0F6E56') : p.color;

      ctx.save();

      // ── Glow for title-only hover
      if (isHov && titleOnly) {
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 18;
      }

      // ── Base circle
      ctx.beginPath(); ctx.arc(p.px, p.py, r, 0, Math.PI*2);
      ctx.fillStyle = fill; ctx.fill();
      ctx.shadowBlur = 0;

      // ── Image thumbnail
      if (isImg) {
        const img = imgCache[p.content.trim()];
        if (img) {
          ctx.save();
          ctx.beginPath(); ctx.arc(p.px, p.py, r, 0, Math.PI*2); ctx.clip();
          const size = r*2, aspect = img.width/img.height;
          let sw=size, sh=size;
          if (aspect>1) sh=size/aspect; else sw=size*aspect;
          ctx.globalAlpha = isLinked ? 0.5 : 1;
          ctx.drawImage(img, p.px-sw/2, p.py-sh/2, sw, sh);
          ctx.globalAlpha = 1;
          ctx.restore();
          // On hover: overlay a slight vignette + camera icon hint
          if (isHov) {
            ctx.save();
            ctx.beginPath(); ctx.arc(p.px, p.py, r, 0, Math.PI*2); ctx.clip();
            ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.fill();
            // camera icon (simple unicode drawn in canvas)
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.font = `${Math.max(12, Math.round(14*p.scale))}px sans-serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('🔍', p.px, p.py);
            ctx.restore();
          }
        } else if (img === undefined) {
          ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font=`${Math.max(8,Math.round(9*p.scale))}px sans-serif`;
          ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('...', p.px, p.py);
        } else {
          ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font=`${Math.max(10,Math.round(13*p.scale))}px sans-serif`;
          ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('?', p.px, p.py);
        }
      }

      // ── For non-image text nodes: on hover show hamburger lines icon
      if (!isImg && hasContent && isHov) {
        ctx.fillStyle = 'rgba(255,255,255,0.82)';
        const lw = r * 0.55, lh = Math.max(1.5, r * 0.08), gap = lh * 2.2;
        const lx = p.px - lw/2, ly = p.py - gap;
        for (let i=0; i<3; i++) {
          roundRect(lx, ly + i*gap, lw, lh, lh/2);
          ctx.fill();
        }
      }

      // ── Selection / edit ring
      if (isSel || isEdit) {
        ctx.beginPath(); ctx.arc(p.px, p.py, r, 0, Math.PI*2);
        ctx.strokeStyle = dark ? '#85B7EB' : '#378ADD';
        ctx.lineWidth = 2.5; ctx.stroke();
      }

      ctx.restore();

      // ── ID badge (top-right of circle)
      const badgeR = Math.max(7, 8*p.scale);
      const bx = p.px + r*0.65, by = p.py - r*0.65;
      ctx.beginPath(); ctx.arc(bx, by, badgeR, 0, Math.PI*2);
      ctx.fillStyle = isImg ? 'rgba(0,0,0,0.6)' : 'rgba(0,0,0,0.25)'; ctx.fill();
      ctx.fillStyle='#fff';
      ctx.font=`600 ${Math.max(7,Math.round(8*p.scale))}px 'Segoe UI',sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.id, bx, by);

      // ── Label pill below the node
      // Always show title if present; on hover also show content preview for text nodes
      const labelFontSize = Math.max(9, Math.round(10*p.scale));
      ctx.font = `${labelFontSize}px 'Segoe UI',sans-serif`;

      const pillPadX = 8, pillPadY = 5, pillGap = 6, pillRadius = 5;
      const maxPillW = Math.max(80, r * 4.5);

      let pillLines = [];

      if (p.title) {
        // Wrap title
        const titleLines = wrapText(p.title, maxPillW - pillPadX*2);
        pillLines = titleLines;
      }

      // On hover, append content preview for text (non-image) nodes
      if (isHov && hasContent && !isImg) {
        // Show up to first ~60 chars of content as preview lines
        const preview = p.content.length > 60 ? p.content.slice(0,58)+'…' : p.content;
        ctx.font = `${Math.max(8, Math.round(9*p.scale))}px 'Segoe UI',sans-serif`;
        const previewLines = wrapText(preview, maxPillW - pillPadX*2);
        // We'll draw title in bold and preview in smaller below; store separately
        pillLines = { title: pillLines, preview: previewLines };
      }

      // ── Draw pill
      const isComplex = pillLines && typeof pillLines === 'object' && pillLines.title !== undefined;
      const titleArr   = isComplex ? pillLines.title   : (Array.isArray(pillLines) ? pillLines : []);
      const previewArr = isComplex ? pillLines.preview : [];

      if (titleArr.length > 0 || previewArr.length > 0) {
        const titleFontSize   = labelFontSize;
        const previewFontSize = Math.max(8, Math.round(9*p.scale));
        const titleLH   = titleFontSize + 2;
        const previewLH = previewFontSize + 2;

        const totalH = titleArr.length * titleLH + (previewArr.length > 0 ? 4 + previewArr.length * previewLH : 0);

        // Measure max line width to size pill
        ctx.font = `600 ${titleFontSize}px 'Segoe UI',sans-serif`;
        let maxLineW = 0;
        titleArr.forEach(l => { maxLineW = Math.max(maxLineW, ctx.measureText(l).width); });
        ctx.font = `${previewFontSize}px 'Segoe UI',sans-serif`;
        previewArr.forEach(l => { maxLineW = Math.max(maxLineW, ctx.measureText(l).width); });
        maxLineW = Math.min(maxLineW, maxPillW - pillPadX*2);

        const pillW = maxLineW + pillPadX*2;
        const pillH = totalH + pillPadY*2;
        const pillX = p.px - pillW/2;
        const pillY = p.py + r + pillGap;

        // Pill background
        const dark2 = isDark();
        roundRect(pillX, pillY, pillW, pillH, pillRadius);
        ctx.fillStyle = dark2 ? 'rgba(30,30,50,0.82)' : 'rgba(240,240,255,0.88)';
        ctx.fill();
        // Pill border tinted with node color
        roundRect(pillX, pillY, pillW, pillH, pillRadius);
        ctx.strokeStyle = hexAlpha(p.color, 0.55);
        ctx.lineWidth = 0.8; ctx.stroke();

        // Title lines
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        let curY = pillY + pillPadY;
        ctx.font = `600 ${titleFontSize}px 'Segoe UI',sans-serif`;
        ctx.fillStyle = dark2 ? 'rgba(220,220,240,0.95)' : 'rgba(20,20,50,0.92)';
        titleArr.forEach(l => { ctx.fillText(l, p.px, curY); curY += titleLH; });

        // Preview lines (if any)
        if (previewArr.length > 0) {
          curY += 4;
          ctx.font = `${previewFontSize}px 'Segoe UI',sans-serif`;
          ctx.fillStyle = dark2 ? 'rgba(160,160,190,0.85)' : 'rgba(80,80,120,0.8)';
          previewArr.forEach(l => { ctx.fillText(l, p.px, curY); curY += previewLH; });
        }
      } else if (!p.title && !isImg) {
        // Fallback: no title, show short content text plain (no pill)
        const labelY = p.py + r + 13;
        ctx.fillStyle = dark ? 'rgba(200,200,220,0.85)' : 'rgba(40,40,80,0.82)';
        ctx.font = `${labelFontSize}px 'Segoe UI',sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        const short = p.content.length>18 ? p.content.slice(0,16)+'…' : p.content;
        ctx.fillText(short, p.px, labelY);
      }
    });

    requestAnimationFrame(draw);
  }

  // ── Hit test ───────────────────────────────────────────────

  function hitTest(ex, ey) {
    for (let i=nodes.length-1; i>=0; i--) {
      const n=nodes[i], p=positions[n.id]; if (!p) continue;
      const { px, py, scale } = project(p.x,p.y,p.z);
      const r = Math.max(14,18*scale)*1.12; // use hovered radius for generous hit
      if ((ex-px)**2+(ey-py)**2<=r*r) return n.id;
    }
    return null;
  }

  // ── Mouse ──────────────────────────────────────────────────

  const DRAG_THRESHOLD = 4;

  // Track mouse position for hover detection (outside of drag)
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const ex = e.clientX-rect.left, ey = e.clientY-rect.top;

    if (!drag.active) {
      const hit = hitTest(ex, ey);
      hoveredId = hit;
      canvas.style.cursor = hit != null ? 'pointer' : 'default';
    }

    if (!drag.active) return;
    const dx=e.clientX-drag.last.x, dy=e.clientY-drag.last.y;
    if (!drag.moved) {
      if (Math.abs(dx)<DRAG_THRESHOLD && Math.abs(dy)<DRAG_THRESHOLD) return;
      drag.moved=true;
    }
    if (drag.type==='cam') { cam.rotY+=dx*0.006; cam.rotX+=dy*0.006; }
    else { cam.panX+=dx; cam.panY+=dy; }
    drag.last={x:e.clientX,y:e.clientY};
  });

  canvas.addEventListener('mouseleave', () => { drag.active=false; hoveredId=null; canvas.style.cursor='default'; });

  canvas.addEventListener('mousedown', e => {
    const rect=canvas.getBoundingClientRect();
    const ex=e.clientX-rect.left, ey=e.clientY-rect.top;
    const hit=hitTest(ex,ey);
    if (hit!=null) {
      if (editingId!=null && hit!==editingId) {
        editLinks=editLinks.includes(hit)?editLinks.filter(x=>x!==hit):[...editLinks,hit];
        renderLinks(); return;
      }
      selectedId=hit;
      drag={active:true,last:{x:e.clientX,y:e.clientY},type:'pan',moved:false};
      startEdit(hit);
    } else {
      drag={active:true,last:{x:e.clientX,y:e.clientY},type:'cam',moved:false};
    }
  });

  canvas.addEventListener('mouseup', () => {
    if (drag.active && !drag.moved && drag.type==='cam') clearForm();
    if (drag.active && !drag.moved && drag.type==='pan' && selectedId!=null) {
      centerOnNode(selectedId);
    }
    drag.active=false;
  });

  // Double-click → detail modal
  canvas.addEventListener('dblclick', e => {
    const rect=canvas.getBoundingClientRect();
    const ex=e.clientX-rect.left, ey=e.clientY-rect.top;
    const hit=hitTest(ex,ey);
    if (hit==null) return;
    const n=nodes.find(x=>x.id===hit);
    if (!n) return;
    const hasContent = (n.content||'').trim().length>0;
    if (!hasContent) return; // no detail for title-only nodes
    openDetailModal(n);
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    cam.zoom*=e.deltaY>0?0.93:1.07;
    cam.zoom=Math.max(0.15,Math.min(4,cam.zoom));
  }, {passive:false});

  // ── Touch ──────────────────────────────────────────────────

  let lastTouchDist=null;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length===1) {
      const t=e.touches[0], rect=canvas.getBoundingClientRect();
      const hit=hitTest(t.clientX-rect.left, t.clientY-rect.top);
      if (hit!=null) {
        if (editingId!=null && hit!==editingId) {
          editLinks=editLinks.includes(hit)?editLinks.filter(x=>x!==hit):[...editLinks,hit];
          renderLinks(); return;
        }
        selectedId=hit; startEdit(hit);
      }
      drag={active:true,last:{x:t.clientX,y:t.clientY},type:hit!=null?'pan':'cam',moved:false};
    }
    if (e.touches.length===2) {
      const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      lastTouchDist=Math.sqrt(dx*dx+dy*dy);
    }
  },{passive:true});

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length===1 && drag.active) {
      const t=e.touches[0], dx=t.clientX-drag.last.x, dy=t.clientY-drag.last.y;
      if (!drag.moved) { if (Math.abs(dx)<DRAG_THRESHOLD && Math.abs(dy)<DRAG_THRESHOLD) return; drag.moved=true; }
      if (drag.type==='cam') { cam.rotY+=dx*0.006; cam.rotX+=dy*0.006; }
      else { cam.panX+=dx; cam.panY+=dy; }
      drag.last={x:t.clientX,y:t.clientY};
    }
    if (e.touches.length===2 && lastTouchDist) {
      const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      cam.zoom*=dist/lastTouchDist; cam.zoom=Math.max(0.15,Math.min(4,cam.zoom));
      lastTouchDist=dist;
    }
  },{passive:false});

  canvas.addEventListener('touchend', () => {
    if (!drag.moved && drag.type==='pan' && selectedId!=null) centerOnNode(selectedId);
    drag.active=false; lastTouchDist=null;
  });

  // ── Detail modal ───────────────────────────────────────────

  function openDetailModal(n) {
    const isImg = isImageUrl(n.content);
    document.getElementById('detail-title').textContent = n.title || ('#'+n.id);
    const imgEl  = document.getElementById('detail-img');
    const bodyEl = document.getElementById('detail-body');
    if (isImg) {
      imgEl.src = n.content.trim(); imgEl.style.display='block';
      bodyEl.textContent = '';
    } else {
      imgEl.style.display='none'; imgEl.src='';
      bodyEl.textContent = n.content;
    }
    document.getElementById('detail-modal').classList.add('open');
  }
  document.getElementById('btn-detail-close').onclick = () => document.getElementById('detail-modal').classList.remove('open');

  // ── Image modal ────────────────────────────────────────────

  function openImgModal(url) {
    document.getElementById('img-modal-img').src=url;
    document.getElementById('img-modal-caption').textContent=url;
    document.getElementById('img-modal').classList.add('open');
  }
  document.getElementById('btn-img-close').onclick=()=>document.getElementById('img-modal').classList.remove('open');

  // ── Color picker sync ──────────────────────────────────────

  const colorPicker=document.getElementById('f-color-picker');
  const colorHex=document.getElementById('f-color-hex');
  colorPicker.addEventListener('input',()=>{ colorHex.value=colorPicker.value.toUpperCase(); });
  colorHex.addEventListener('input',()=>{ const n=normaliseHex(colorHex.value); if(n) colorPicker.value=n; });
  colorHex.addEventListener('blur',()=>{ const n=normaliseHex(colorHex.value); colorHex.value=n||DEFAULT_COLOR; colorPicker.value=colorHex.value; });
  function getFormColor(){ return normaliseHex(colorHex.value)||DEFAULT_COLOR; }
  function setFormColor(hex){ const n=normaliseHex(hex)||DEFAULT_COLOR; colorPicker.value=n; colorHex.value=n; }

  // ── Form helpers ───────────────────────────────────────────

  function renderLinks() {
    const el=document.getElementById('links-list'); el.innerHTML='';
    if (editLinks.length===0) { el.innerHTML='<span style="font-size:11px;color:var(--text-tertiary)">Click nodes in the graph to link</span>'; return; }
    editLinks.forEach(lid => {
      const tag=document.createElement('span'); tag.className='link-tag';
      tag.innerHTML=`#${lid} <span style="font-size:10px;margin-left:2px">✕</span>`;
      tag.onclick=()=>{ editLinks=editLinks.filter(x=>x!==lid); renderLinks(); };
      el.appendChild(tag);
    });
  }

  function startEdit(id) {
    const n=nodes.find(x=>x.id===id); if (!n) return;
    editingId=id; editLinks=[...n.links_to];
    document.getElementById('f-id').value=n.id;
    document.getElementById('f-title').value=n.title||'';
    document.getElementById('f-content').value=n.content||'';
    setFormColor(n.color||DEFAULT_COLOR);
    document.getElementById('form-title').textContent='Edit node #'+id;
    renderLinks(); renderNodeList();
  }

  function clearForm() {
    editingId=null; editLinks=[]; selectedId=null;
    document.getElementById('f-id').value='';
    document.getElementById('f-title').value='';
    document.getElementById('f-content').value='';
    setFormColor(DEFAULT_COLOR);
    document.getElementById('form-title').textContent='New node';
    renderLinks(); renderNodeList();
  }

  function renderNodeList() {
    const ul=document.getElementById('nodes-ul'); ul.innerHTML='';
    if (nodes.length===0) { ul.innerHTML='<div class="empty-hint">No nodes yet. Click "+ Add node" to start.</div>'; return; }
    nodes.forEach(n => {
      const div=document.createElement('div');
      div.className='node-item'+(n.id===editingId?' selected':'');
      const label = n.title || (isImageUrl(n.content)?'🖼 image':n.content) || '(empty)';
      div.innerHTML=`<span class="ndot" style="background:${n.color||DEFAULT_COLOR}"></span><span class="nid">#${n.id}</span><span class="ncontent">${label}</span><span class="ndel" title="Delete node">✕</span>`;
      div.onclick=e=>{
        if (e.target.classList.contains('ndel')) {
          nodes=nodes.filter(x=>x.id!==n.id);
          nodes.forEach(x=>{x.links_to=x.links_to.filter(l=>l!==n.id);});
          delete positions[n.id];
          if (editingId===n.id) clearForm(); else renderNodeList(); return;
        }
        selectedId=n.id; startEdit(n.id); centerOnNode(n.id);
      };
      ul.appendChild(div);
    });
  }

  // ── Toolbar ────────────────────────────────────────────────

  document.getElementById('btn-add').onclick=()=>{ clearForm(); document.getElementById('f-title').focus(); };

  document.getElementById('btn-save-node').onclick=()=>{
    const title=(document.getElementById('f-title').value||'').trim();
    const content=(document.getElementById('f-content').value||'').trim();
    if (!title && !content) { document.getElementById('f-title').focus(); return; }
    const color=getFormColor();
    if (editingId!=null) {
      const n=nodes.find(x=>x.id===editingId);
      if (n) { n.title=title; n.content=content; n.links_to=[...editLinks]; n.color=color; }
    } else {
      const id=nextId++;
      nodes.push({id,title,content,color,links_to:[...editLinks]});
      ensurePosition(id); selectedId=id;
    }
    if (isImageUrl(content)) loadImage(content);
    renderNodeList(); clearForm();
  };

  document.getElementById('btn-save').onclick=()=>{
    document.getElementById('save-ta').value=JSON.stringify(nodes,null,2);
    document.getElementById('save-modal').classList.add('open');
  };
  document.getElementById('btn-save-close').onclick=()=>document.getElementById('save-modal').classList.remove('open');
  document.getElementById('btn-copy').onclick=()=>{
    const ta=document.getElementById('save-ta');
    navigator.clipboard.writeText(ta.value).catch(()=>{ta.select();document.execCommand('copy');});
  };

  document.getElementById('btn-import').onclick=()=>{
    document.getElementById('import-ta').value='';
    document.getElementById('import-modal').classList.add('open');
    setTimeout(()=>document.getElementById('import-ta').focus(),50);
  };
  document.getElementById('btn-import-cancel').onclick=()=>document.getElementById('import-modal').classList.remove('open');
  document.getElementById('btn-import-ok').onclick=()=>{
    try {
      const arr=JSON.parse(document.getElementById('import-ta').value);
      if (!Array.isArray(arr)) throw new Error('Expected a JSON array');
      nodes=arr.map(n=>({
        id:Number(n.id),
        title:String(n.title||''),
        content:String(n.content||''),
        color:normaliseHex(n.color||'')||DEFAULT_COLOR,
        links_to:(n.links_to||[]).map(Number)
      }));
      positions={}; nextId=nodes.length>0?Math.max(...nodes.map(n=>n.id))+1:1;
      nodes.forEach(n=>ensurePosition(n.id));
      preloadImages(); clearForm(); renderNodeList();
      document.getElementById('import-modal').classList.remove('open');
    } catch(e){ alert('Invalid JSON: '+e.message); }
  };

  document.querySelectorAll('.modal-bg').forEach(bg=>{
    bg.addEventListener('click',e=>{ if(e.target===bg) bg.classList.remove('open'); });
  });

  // ── Init ───────────────────────────────────────────────────
  renderNodeList(); renderLinks(); resizeCanvas(); draw();
  window.addEventListener('resize', resizeCanvas);
})();
</script>
</body>
</html>
